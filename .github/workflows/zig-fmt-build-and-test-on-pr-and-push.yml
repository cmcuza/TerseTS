name: Zig Fmt, Build, and Test

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  zig_fmt_build_and_test:
    name: Zig Fmt, Build, and Test

    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v6

    # Zig
    - uses: mlugg/setup-zig@v2
      with:
        version: 0.16.0
    - name: Zig Fmt Check
      run: zig fmt --check .
      if: runner.os != 'Windows' # Windows disagrees with Ubuntu and macOS.
    - name: Zig Build Debug
      run: zig build -Doptimize=Debug
    - name: Zig Build ReleaseFast
      run: zig build -Doptimize=ReleaseFast
    - name: Zig Build Test Debug
      run: zig build test -Doptimize=Debug
    - name: Zig Build Test ReleaseFast
      run: zig build test -Doptimize=ReleaseFast

    # C
    - name: Clang Compile Header
      run: clang -Weverything tersets.h
      working-directory: bindings/c
    - name: GCC Compile Header
      run: gcc -Wall -Wextra tersets.h
      working-directory: bindings/c

    # Julia
    - name: Set Up Julia
      uses: julia-actions/setup-julia@v2
      with:
        version: "1"
    - name: Julia Run Unittest
      run: julia Tests.jl
      working-directory: bindings/julia

    # Python
    - name: Python Upgrade pip
      run: python -m pip install --upgrade pip
    - name: Python Install Binding
      run: python -m pip install . -v
      working-directory: bindings/python
    - name: Python Verify Installed Binding Import
      run: python -c "import pathlib, tersets; p=str(pathlib.Path(tersets.__file__)).lower(); print(p); assert 'site-packages' in p or 'dist-packages' in p"
    - name: Python Run Unittest
      run: python -m unittest --verbose
      working-directory: bindings/python

    # The presence of .dylib files breaks static linking on macOS.
    - name: Clear Zig Cache and Zig Out
      run: rm -rf .zig-cache zig-out
      shell: bash

    # Rust
    - name: Rustup Update
      run: rustup update
    - name: Cargo Build
      run: cargo build --verbose --release --all-targets
      working-directory: bindings/rust

    # TEMPORARY diagnostic (remove before merge, together with .github/ci-diagnostics/):
    # observe compiler_rt.o archive-member alignment and soft-float symbol resolution on
    # the real Apple toolchain across the raw -> libtool -> ranlib stages. continue-on-error
    # keeps it from ever blocking the real clippy/doc/test steps below.
    - name: macOS compiler_rt archive diagnostic
      if: ${{ always() && runner.os == 'macOS' }}
      continue-on-error: true
      shell: bash
      run: |
        set -u
        echo "== Toolchain =="
        zig version
        xcrun --show-sdk-version 2>/dev/null || true
        ld -v 2>&1 | head -2 || true

        work="$(mktemp -d)"
        echo
        echo "== Build raw static archive for aarch64-macos.11.0 (no libtool/ranlib) =="
        zig build -Dlinking=static -Dpic=true -Doptimize=ReleaseFast \
          -Dtarget=aarch64-macos.11.0 --prefix "$work/out" --cache-dir "$work/cache"
        cp "$work/out/lib/libtersets.a" "$work/raw.a"

        echo
        echo "== Apply 'libtool -static' (expect the 8-byte alignment warning on stderr) =="
        libtool -static -o "$work/libtool.a" "$work/raw.a"

        echo
        echo "== Apply 'ranlib' on top of libtool =="
        cp "$work/libtool.a" "$work/ranlib.a"
        ranlib "$work/ranlib.a"

        echo
        echo "== Member offsets: raw -> libtool -> ranlib =="
        python3 .github/ci-diagnostics/ar_offsets.py \
          "$work/raw.a" "$work/libtool.a" "$work/ranlib.a"

        echo
        echo "== _roundq / ___addxf3 across stages (T=defined, U=undefined) =="
        for stage in raw libtool ranlib; do
          echo "[$stage.a]"
          nm -A -arch arm64 "$work/$stage.a" 2>/dev/null \
            | grep -E ' _roundq$| ___addxf3$' | sort -u | sed 's/^/  /' || true
        done

        echo
        echo "== Actual cargo-built archive (final, as linked by cargo test) =="
        real="zig-out/lib/libtersets.a"
        if [ -f "$real" ]; then
          python3 .github/ci-diagnostics/ar_offsets.py "$real"
        else
          echo "  not found: $real"
        fi

    - name: Cargo Clippy
      run: cargo clippy --verbose --release --all-targets
      working-directory: bindings/rust
    - name: Cargo Doc
      run: cargo doc --verbose --release --no-deps
      working-directory: bindings/rust
    - name: Cargo Test
      run: cargo test --verbose --release --all-targets -- --nocapture
      working-directory: bindings/rust
